services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agreemint
      POSTGRES_PASSWORD: agreemint
      POSTGRES_DB: agreemint
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agreemint"]
      interval: 3s
      timeout: 3s
      retries: 10
